name: tgc_client
description: "TGC Carpets ERP mobile client."
publish_to: 'none'

version: 1.0.5+5

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.6.2

  # State management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Networking
  dio: ^5.7.0
  pretty_dio_logger: ^1.4.0

  # Dependency injection
  get_it: ^8.0.3

  # Storage / auth
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.3

  # Functional error handling
  dartz: ^0.10.1

  # Connectivity
  connectivity_plus: ^6.1.1
  hugeicons: ^1.1.6

  #Label printing
  usb_label_print:
    path: ../usb_label_print

  # Image picking & processing
  image_picker: ^1.1.2
  image: ^4.5.0
  # QR / barcode scanning
  mobile_scanner: ^6.0.7
  rename_app: ^1.6.5
  change_app_package_name: ^1.5.0
  flutter_launcher_icons: ^0.14.4
  cached_network_image: ^3.4.1
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.5
  barcode_widget: ^2.0.4
  qr_flutter: ^4.1.0
  share_plus: ^12.0.2
  file_picker: ^11.0.2
  excel: ^4.0.6
  linked_scroll_controller: ^0.2.0
  simple_numpad: ^1.0.5
  package_info_plus: ^8.1.2
  ota_update: ^7.1.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  assets:
    - assets/
  uses-material-design: true
  fonts:
    - family: Onest
      fonts:
        - asset: fonts/Onest-Regular.ttf
          weight: 400
        - asset: fonts/Onest-Light.ttf
          weight: 200
        - asset: fonts/Onest-Bold.ttf
          weight: 700
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
